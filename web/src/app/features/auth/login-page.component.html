<form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  <mat-card>
    <mat-card-title>Bienvenue</mat-card-title>
    <div *ngIf="serverError" class="server-error">{{ serverError }}</div>
    <mat-card-content>
      <mat-form-field>
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" />

        <mat-error *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']">
          L’email est obligatoire.
        </mat-error>

        <mat-error *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']">
          Format d’email invalide.
        </mat-error>

      </mat-form-field>
      <mat-form-field>
        <mat-label>Mot de passe</mat-label>
        <input matInput type="password" formControlName="password" />

        <mat-error *ngIf="passwordCtrl.touched && passwordCtrl.errors?.['required']">
          Le mot de passe est obligatoire.
        </mat-error>

        <mat-error *ngIf="passwordCtrl.touched && passwordCtrl.errors?.['minlength']">
          Le mot de passe doit contenir au moins 6 caractères.
        </mat-error>
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid || loading">Se connecter</button>
      <button mat-button type="button" (click)="loginAsDoctor()">Login as doctor@wardcare.fr</button>
    </mat-card-actions>
  </mat-card>
</form>
