services:
  db:
    image: postgres:16
    container_name: wardcare-db
    environment:
      POSTGRES_DB: wardcare
      POSTGRES_USER: wardcare
      POSTGRES_PASSWORD: wardcare
    ports:
      - "5433:5432"
    volumes:
      - wardcare_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U wardcare -d wardcare" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  wardcare_pgdata:
