services:
  db:
    image: postgres:16
    container_name: nowatt-db
    environment:
      POSTGRES_DB: nowatt
      POSTGRES_USER: nowatt
      POSTGRES_PASSWORD: nowatt
    ports:
      - "5432:5432"
    volumes:
      - nowatt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nowatt -d nowatt"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  nowatt_pgdata:
